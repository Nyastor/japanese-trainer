<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kana Night — Japanese Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="topHotspot"></div>

  <!-- Persistent top hint — click to open menu -->
  <div id="topHint">☰ Settings</div>

  <div class="topbar" id="topbar">
    <div class="tb-left">

      <!-- ① Global mode -->
      <span class="label">Mode:</span>
      <select id="selGlobalMode">
        <option value="kana">Kana</option>
        <option value="numbers">Numbers</option>
        <option value="time">Time</option>
        <option value="calendar">Calendar</option>
      </select>

      <span class="tb-sep"></span>

      <!-- ② Kana controls -->
      <span id="kanaControls" class="tb-group">
        <span class="label">Script:</span>
        <select id="selScript">
          <option value="hiragana">Hiragana</option>
          <option value="katakana">Katakana</option>
          <option value="both_mix">Both (mix)</option>
          <option value="both_together">Both (together)</option>
        </select>
        <span class="label">Order:</span>
        <select id="selOrder">
          <option value="sequential">Sequential</option>
          <option value="random">Random</option>
        </select>
        <label class="chk"><input type="checkbox" id="optDakuten" /> Dakuten</label>
        <label class="chk"><input type="checkbox" id="optYoon" /> Yoon</label>
        <label class="chk"><input type="checkbox" id="optReverse" /> Reverse quiz</label>
        <span class="label hidden" id="choicesLabel">Choices:</span>
        <input id="choicesN" type="number" min="2" max="12" value="6" class="num hidden" />
      </span>

      <!-- ③ Numbers controls -->
      <span id="numControls" class="tb-group hidden">
        <span class="label">Range:</span>
        <select id="selNumMode">
          <option value="mixed">Mixed</option>
          <option value="units">Units (0–9)</option>
          <option value="tens">Tens (10–99)</option>
          <option value="hundreds">Hundreds (100–999)</option>
          <option value="thousands">Thousands (1000–9999)</option>
          <option value="large">Large (10k–999k)</option>
        </select>
        <span class="label">Min:</span>
        <input id="numMin" type="number" min="0" max="999999" value="1" class="num" />
        <span class="label">Max:</span>
        <input id="numMax" type="number" min="0" max="999999" value="9999" class="num" />
        <span class="label">Cards:</span>
        <input id="numDeckSize" type="number" min="1" max="100" value="20" class="num" />
        <label class="chk"><input type="checkbox" id="optNumKanji"  checked /> Kanji</label>
        <label class="chk"><input type="checkbox" id="optNumRomaji" checked /> Romaji</label>
        <label class="chk"><input type="checkbox" id="optNumHira"   checked /> Hiragana</label>
      </span>

      <!-- ④ Time controls -->
      <span id="timeControls" class="tb-group hidden">
        <span class="label">Format:</span>
        <select id="selTimeFormat">
          <option value="24h">24h</option>
          <option value="12h">12h</option>
        </select>

        <span class="label">Step:</span>
        <select id="selTimeStep">
          <option value="1">1 min</option>
          <option value="5" selected>5 min</option>
          <option value="10">10 min</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
        </select>

        <span class="label">Range:</span>
        <select id="selTimeRange">
          <option value="full">Full day</option>
          <option value="morning">Morning (5–11)</option>
          <option value="day">Day (12–17)</option>
          <option value="evening">Evening (18–22)</option>
          <option value="night">Night (23–4)</option>
        </select>

        <span class="label">Front:</span>
        <select id="selShowFront">
          <option value="time">Time digits</option>
          <option value="kanji">Kanji</option>
          <option value="hira">Hiragana</option>
          <option value="mixed">Mixed</option>
        </select>

        <span class="label">Order:</span>
        <select id="selTimeOrder">
          <option value="random">Random</option>
          <option value="sequential">Sequential</option>
        </select>

        <span id="gozenGogoWrap" class="hidden">
          <label class="chk"><input type="checkbox" id="optGozenGogo" /> 午前/午後</label>
        </span>
        <label class="chk"><input type="checkbox" id="optSpecial" /> Phrases</label>
      </span>

      <!-- ⑤ Calendar controls -->
      <span id="calControls" class="tb-group hidden">
        <span class="label">Scope:</span>
        <select id="selCalScope">
          <option value="mixed">All</option>
          <option value="weekdays">Weekdays</option>
          <option value="days">Month days</option>
          <option value="months">Months</option>
          <option value="wd_days">Weekdays + Days</option>
          <option value="days_months">Days + Months</option>
        </select>
        <span class="label">Front:</span>
        <select id="selCalFront">
          <option value="kanji">Kanji</option>
          <option value="hira">Hiragana</option>
          <option value="romaji">Romaji</option>
          <option value="meaning">Meaning</option>
          <option value="mixed">Mixed</option>
        </select>
        <span class="label">Order:</span>
        <select id="selCalOrder">
          <option value="random">Random</option>
          <option value="sequential">Sequential</option>
        </select>
        <span class="label">Days:</span>
        <select id="selCalDayMin">
          <option value="1">1</option><option value="11">11</option><option value="21">21</option>
        </select>
        <span style="color:#888;font-size:12px">–</span>
        <select id="selCalDayMax">
          <option value="10">10</option><option value="20">20</option><option value="31" selected>31</option>
        </select>
        <label class="chk"><input type="checkbox" id="optCalExOnly" /> Exc. only</label>
        <span class="label">Mo:</span>
        <select id="selCalMonthMin">
          <option value="1">Jan</option><option value="4">Apr</option><option value="7">Jul</option><option value="10">Oct</option>
        </select>
        <span style="color:#888;font-size:12px">–</span>
        <select id="selCalMonthMax">
          <option value="3">Mar</option><option value="6">Jun</option><option value="9">Sep</option><option value="12" selected>Dec</option>
        </select>
        <span class="label">Meaning:</span>
        <select id="selCalMeaning">
          <option value="en">EN</option>
          <option value="ru">RU</option>
          <option value="off">Off</option>
        </select>
      </span>

    </div>
    <div class="tb-right">
      <span class="stat-txt" id="statTxt"></span>
    </div>
  </div>

  <div class="wrap">

    <!-- Flashcard view -->
    <div id="flashView">
      <div class="card" id="card" tabindex="0">
        <div class="card-face" id="cardFront"></div>
        <div class="card-answer" id="cardAnswer"></div>
      </div>
      <div class="choices-row hidden" id="choicesRow"></div>
      <div class="actions-row" id="actionsRow">
        <button id="btnAgain">↩ Again</button>
        <button id="btnKnown" class="primary">✓ Known</button>
        <button id="btnReset" class="ghost">↺ Reset</button>
      </div>
    </div>

    <!-- Tables view -->
    <div id="tableView" class="hidden">
      <div class="table-header">
        <span class="table-title" id="tableTitle">Chart</span>
      </div>
      <div class="table-scroller" id="tableScroller"></div>
    </div>

    <button class="tables-btn" id="btnTables">Tables</button>

  </div>

  <script src="main.js"></script>
</body>
</html>
